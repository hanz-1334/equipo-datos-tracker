<style>
  :root{
    --bg:#0f1115; --panel:#161923; --panel-2:#1d2130; --border:#2a2f3f;

    --red:#ff5470; --red-bg:rgba(255,84,112,0.12);
    --amber:#ffb84d; --amber-bg:rgba(255,184,77,0.12);
    --blue:#4d9bff; --blue-bg:rgba(77,155,255,0.12);
    --green:#4ddb8f; --green-bg:rgba(77,219,143,0.12);
    --accent:#8b7bff;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;}
  .app{display:flex;flex-direction:column;height:100vh;}

  /* Topbar */
  .topbar{display:flex;align-items:center;gap:16px;padding:12px 20px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;}
  .topbar h1{font-size:15px;font-weight:600;margin:0;white-space:nowrap;}
  .topbar h1 span{color:var(--text-dim);font-weight:400;}
  .pills{display:flex;gap:8px;flex:1;}
  .pill{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid transparent;}
  .pill.red{background:var(--red-bg);color:var(--red);}
  .pill.amber{background:var(--amber-bg);color:var(--amber);}
  .pill.blue{background:var(--blue-bg);color:var(--blue);}
  .pill.active{border-color:currentColor;}
  .mode-toggle{display:flex;gap:6px;}
  .mode-toggle button{border:1px solid var(--border);background:var(--panel-2);color:var(--text-dim);padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;}
  .mode-toggle button.active{background:var(--accent);color:#fff;border-color:var(--accent);}

  /* Body layout */
  .body{display:flex;flex:1;overflow:hidden;}

  /* Sidebar */
  .sidebar{width:280px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;padding:14px 0;}
  .side-group{margin-bottom:6px;}
  .side-group-title{padding:8px 16px 6px;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-faint);font-weight:700;display:flex;align-items:center;gap:6px;}
  .side-item{padding:9px 16px 9px 22px;cursor:pointer;font-size:13px;color:var(--text-dim);border-left:3px solid transparent;line-height:1.35;}
  .side-item:hover{background:var(--panel-2);color:var(--text);}
  .side-item.active{background:var(--panel-2);color:var(--text);font-weight:600;}
  .side-item.active.red{border-left-color:var(--red);}
  .side-item.active.amber{border-left-color:var(--amber);}
  .side-item.active.blue{border-left-color:var(--blue);}
  .side-item .deadline-tag{display:block;font-size:11px;color:var(--red);margin-top:2px;}
  .side-closed{padding:8px 16px 8px 22px;font-size:12px;color:var(--text-faint);cursor:pointer;}
  .side-closed:hover{color:var(--text-dim);}

  /* Main panel */
  .main{flex:1;overflow-y:auto;padding:28px 36px;}
  .empty-state{color:var(--text-faint);font-size:14px;padding-top:40px;text-align:center;}

  .proj-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px;}
  .proj-title{font-size:22px;font-weight:700;margin:0 0 6px;}
  .proj-meta{display:flex;flex-wrap:wrap;gap:8px;font-size:12px;color:var(--text-dim);}
  .badge{padding:3px 10px;border-radius:6px;font-weight:600;font-size:11px;}
  .badge.red{background:var(--red-bg);color:var(--red);}
  .badge.amber{background:var(--amber-bg);color:var(--amber);}
  .badge.blue{background:var(--blue-bg);color:var(--blue);}
  .badge.green{background:var(--green-bg);color:var(--green);}
  .badge.neutral{background:var(--panel-2);color:var(--text-dim);border:1px solid var(--border);}

  .card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:16px;}
  .card h3{font-size:13px;text-transform:uppercase;letter-spacing:0.4px;color:var(--text-faint);margin:0 0 10px;}
  .card p{margin:0 0 8px;font-size:14px;line-height:1.6;color:var(--text);}
  .card ul{margin:0;padding-left:20px;}
  .card li{font-size:14px;line-height:1.7;color:var(--text);margin-bottom:4px;}
  .card .pending li{color:var(--text-dim);}
  .rel-tags{display:flex;flex-wrap:wrap;gap:6px;}
  .rel-tag{background:var(--panel-2);border:1px solid var(--border);color:var(--text-dim);font-size:12px;padding:4px 10px;border-radius:6px;cursor:pointer;}
  .rel-tag:hover{color:var(--text);border-color:var(--accent);}

  .notes-placeholder{background:var(--panel-2);border:1px dashed var(--border);border-radius:10px;padding:16px 18px;font-size:13px;color:var(--text-faint);line-height:1.6;}

  /* Notas de proyecto (Google Sheet vía Apps Script) */
  .notes-list{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
  .note-item{background:var(--panel-2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;}
  .note-item.resuelta{opacity:0.5;}
  .note-meta{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--text-faint);margin-bottom:4px;}
  .note-author{font-weight:700;color:var(--text-dim);}
  .note-text{font-size:13px;color:var(--text);line-height:1.5;white-space:pre-wrap;}
  .note-actions{display:flex;gap:10px;margin-top:6px;}
  .note-actions button{background:none;border:none;color:var(--text-faint);font-size:11px;cursor:pointer;padding:0;}
  .note-actions button:hover{color:var(--accent);}
  .notes-empty{font-size:13px;color:var(--text-faint);margin-bottom:14px;}
  .note-form{display:flex;flex-direction:column;gap:8px;}
  .note-form textarea{width:100%;min-height:60px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:13px;padding:10px 12px;resize:vertical;}
  .note-form-row{display:flex;justify-content:flex-end;gap:8px;align-items:center;}
  .note-role-toggle{display:flex;background:var(--bg);border-radius:16px;padding:3px;border:1px solid var(--border);margin-right:auto;}
  .note-role-toggle button{border:none;background:transparent;color:var(--text-dim);padding:5px 12px;border-radius:13px;font-size:11px;font-weight:600;cursor:pointer;}
  .note-role-toggle button.active{background:var(--accent);color:#fff;}
  .note-submit-btn{background:var(--accent);border:none;color:#fff;font-size:12px;font-weight:600;padding:8px 16px;border-radius:8px;cursor:pointer;}
  .note-submit-btn:disabled{opacity:0.5;cursor:default;}
  .note-status{font-size:12px;color:var(--text-faint);}

  /* Modo 1:1 */
  .checklist-section{margin-bottom:24px;}
  .checklist-section h2{display:flex;align-items:center;gap:8px;font-size:14px;text-transform:uppercase;letter-spacing:0.4px;margin:0 0 12px;}
  .checklist-item{display:flex;gap:12px;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;}
  .checklist-item input[type=checkbox]{margin-top:3px;width:16px;height:16px;flex-shrink:0;accent-color:var(--accent);}
  .checklist-item.checked{opacity:0.45;}
  .checklist-item.checked .ci-title{text-decoration:line-through;}
  .ci-body{flex:1;}
  .ci-title{font-size:14px;font-weight:600;margin-bottom:4px;}
  .ci-context{font-size:13px;color:var(--text-dim);line-height:1.5;margin-bottom:6px;}
  .ci-question{font-size:13px;color:var(--accent);font-style:italic;}
  .ci-link{display:inline-block;margin-top:6px;font-size:11px;color:var(--text-faint);border:1px solid var(--border);padding:2px 8px;border-radius:5px;cursor:pointer;}
  .ci-link:hover{color:var(--text);border-color:var(--accent);}

  ::-webkit-scrollbar{width:9px;}
  ::-webkit-scrollbar-thumb{background:#333748;border-radius:5px;}
  ::-webkit-scrollbar-track{background:transparent;}
</style>
</head>

/* ===================== STATE ===================== */
let state = { mode: "proyectos", role: "Miguel", selected: null, activeFilter: null, checked: {} };

/* ===================== RENDER ===================== */
function urgencyLabel(u){ return u==="red" ? "Urgente" : u==="amber" ? "En curso" : "Progreso normal"; }
function urgencyIcon(u){ return u==="red" ? "🔴" : u==="amber" ? "⚠️" : "🔵"; }

function renderPills(){
  const counts = { red:0, amber:0, blue:0 };
  PROJECTS.forEach(p=>counts[p.urgency]++);
  const pills = document.getElementById("pills");
  pills.innerHTML = `
    <div class="pill red ${state.activeFilter==='red'?'active':''}" onclick="toggleFilter('red')">🔴 ${counts.red} urgentes</div>
    <div class="pill amber ${state.activeFilter==='amber'?'active':''}" onclick="toggleFilter('amber')">⚠️ ${counts.amber} en curso</div>
    <div class="pill blue ${state.activeFilter==='blue'?'active':''}" onclick="toggleFilter('blue')">🔵 ${counts.blue} normal</div>
  `;
}

function toggleFilter(u){
  state.activeFilter = state.activeFilter === u ? null : u;
  render();
}

function setMode(mode){
  state.mode = mode;
  document.getElementById("btnModoProyectos").classList.toggle("active", mode==="proyectos");
  document.getElementById("btnModo11").classList.toggle("active", mode==="1-1");
  render();
}

function setRole(role){
  state.role = role;
  render();
}

function selectProject(id){
  state.selected = id;
  state.mode = "proyectos";
  setMode("proyectos");
}

function renderSidebar(){
  const sidebar = document.getElementById("sidebar");
  const groups = [
    { key:"red", title:"Requieren atención ya" },
    { key:"amber", title:"En curso / sin fecha clara" },
    { key:"blue", title:"En progreso normal" }
  ];
  let html = "";
  groups.forEach(g=>{
    const items = PROJECTS.filter(p=>p.urgency===g.key);
    if(!items.length) return;
    html += `<div class="side-group">
      <div class="side-group-title">${urgencyIcon(g.key)} ${g.title}</div>
      ${items.map(p=>`
        <div class="side-item ${g.key} ${state.selected===p.id?'active':''}" onclick="selectProject('${p.id}')">
          ${p.icon} ${p.name}
          ${p.deadline ? `<span class="deadline-tag">⏳ ${p.deadline}</span>` : ""}
        </div>
      `).join("")}
    </div>`;
  });
  html += `<div class="side-group">
    <div class="side-group-title">✅ Cerrados</div>
    <div class="side-closed">Ver carpeta "Proyectos Cerrados" en Obsidian</div>
  </div>
  <div class="side-group">
    <div class="side-group-title">📜 Referencia</div>
    <div class="side-closed" onclick="selectProject('__acuerdos__')">Acuerdos Permanentes</div>
  </div>`;
  sidebar.innerHTML = html;
}

function renderMain(){
  const main = document.getElementById("main");
  if(state.mode === "1-1"){ renderChecklistMode(main); return; }

  if(state.selected === "__acuerdos__"){
    main.innerHTML = `
      <div class="proj-header"><h2 class="proj-title">📜 Acuerdos Permanentes</h2></div>
      <div class="card">
        <h3>Reglas fijas — no se modifican sin instrucción explícita</h3>
        <ul>${ACUERDOS.map(a=>`<li><strong>${a.id}:</strong> ${a.texto}</li>`).join("")}</ul>
      </div>`;
    return;
  }

  const p = PROJECTS.find(x=>x.id===state.selected);
  if(!p){
    main.innerHTML = `<div class="empty-state">Selecciona un proyecto en la barra lateral para ver el detalle.</div>`;
    return;
  }

  main.innerHTML = `
    <div class="proj-header">
      <div>
        <h2 class="proj-title">${p.icon} ${p.name}</h2>
        <div class="proj-meta">
          <span class="badge ${p.urgency}">${urgencyIcon(p.urgency)} ${urgencyLabel(p.urgency)}</span>
          ${p.deadline ? `<span class="badge red">⏳ Deadline: ${p.deadline}</span>` : ""}
          ${p.personas.length ? `<span class="badge neutral">👥 ${p.personas.join(", ")}</span>` : ""}
          <span class="badge neutral">🕓 Actualizado: ${p.actualizado}</span>
        </div>
      </div>
    </div>

    <div class="card">
      <h3>Por qué importa</h3>
      <p>${p.porque}</p>
    </div>

    <div class="card">
      <h3>Estado actual</h3>
      <ul>${p.estadoActual.map(e=>`<li>${e}</li>`).join("")}</ul>
    </div>

    <div class="card">
      <h3>Pendientes / próximos pasos</h3>
      <ul class="pending">${p.pendientes.map(e=>`<li>${e}</li>`).join("")}</ul>
    </div>

    ${p.relacionado.length ? `
    <div class="card">
      <h3>Relacionado</h3>
      <div class="rel-tags">
        ${p.relacionado.map(rid=>{
          const rp = PROJECTS.find(x=>x.id===rid);
          return rp ? `<div class="rel-tag" onclick="selectProject('${rid}')">${rp.icon} ${rp.name}</div>` : "";
        }).join("")}
      </div>
    </div>` : ""}

    <div class="card">
      <h3>Notas de este proyecto</h3>
      <div id="notes-container-${p.id}">
        <div class="notes-empty">Cargando notas…</div>
      </div>
      <div class="note-form">
        <textarea id="note-input-${p.id}" placeholder="Escribe una nota sobre este proyecto…"></textarea>
        <div class="note-form-row">
          <div class="note-role-toggle">
            <button class="${state.role==='Miguel'?'active':''}" onclick="setRole('Miguel')">Miguel</button>
            <button class="${state.role==='Aris'?'active':''}" onclick="setRole('Aris')">Aris</button>
          </div>
          <span class="note-status" id="note-status-${p.id}"></span>
          <button class="note-submit-btn" onclick="submitNote('${p.id}')">Agregar nota</button>
        </div>
      </div>
    </div>
  `;
  loadNotes(p.id);
}

function renderChecklistMode(main){
  const sections = [
    { key:"urgente", title:"🔴 Urgente / bloqueadores", items: CHECKLIST.urgente },
    { key:"proximas", title:"⚠️ Próximas semanas / sin fecha", items: CHECKLIST.proximas },
    { key:"revisar", title:"🔵 Revisar estado (progreso normal)", items: CHECKLIST.revisar },
    { key:"confirmar", title:"✅ Solo confirmar (completado, cerrar el loop)", items: CHECKLIST.confirmar }
  ];
  main.innerHTML = sections.map(s=>`
    <div class="checklist-section">
      <h2>${s.title}</h2>
      ${s.items.map((item, idx)=>{
        const ckId = s.key+"-"+idx;
        const checked = !!state.checked[ckId];
        const rp = item.link ? PROJECTS.find(p=>p.id===item.link) : null;
        return `
        <div class="checklist-item ${checked?'checked':''}">
          <input type="checkbox" ${checked?'checked':''} onchange="toggleCheck('${ckId}')">
          <div class="ci-body">
            <div class="ci-title">${item.title}</div>
            <div class="ci-context">${item.context}</div>
            ${item.question ? `<div class="ci-question">→ ${item.question}</div>` : ""}
            ${rp ? `<div class="ci-link" onclick="selectProject('${rp.id}')">Ver proyecto: ${rp.icon} ${rp.name}</div>` : ""}
          </div>
        </div>`;
      }).join("")}
    </div>
  `).join("");
}

function toggleCheck(id){
  state.checked[id] = !state.checked[id];
  renderChecklistMode(document.getElementById("main"));
}

/* ===================== NOTAS (Google Sheet vía Apps Script) ===================== */
function fmtFecha(iso){
  try{
    const d = new Date(iso);
    return d.toLocaleString("es-MX", { day:"2-digit", month:"short", year:"numeric", hour:"2-digit", minute:"2-digit" });
  }catch(e){ return iso; }
}

async function loadNotes(projectId){
  const container = document.getElementById(`notes-container-${projectId}`);
  if(!container) return; // el usuario ya cambió de vista antes de que respondiera el fetch
  try{
    const res = await fetch(`${APPS_SCRIPT_URL}?proyecto=${encodeURIComponent(projectId)}`);
    const data = await res.json();
    if(!data.ok) throw new Error(data.error || "Error desconocido");
    renderNotes(projectId, data.notas || []);
  }catch(err){
    const c = document.getElementById(`notes-container-${projectId}`);
    if(c) c.innerHTML = `<div class="notes-empty">No se pudieron cargar las notas (${err.message}). Revisa que APPS_SCRIPT_URL sea correcto y que el deploy tenga acceso "Cualquiera con el enlace".</div>`;
  }
}

function renderNotes(projectId, notas){
  const container = document.getElementById(`notes-container-${projectId}`);
  if(!container) return;
  if(!notas.length){
    container.innerHTML = `<div class="notes-empty">Todavía no hay notas en este proyecto.</div>`;
    return;
  }
  container.innerHTML = `<div class="notes-list">
    ${notas.map(n => `
      <div class="note-item ${n.resuelto === true || n.resuelto === "TRUE" ? "resuelta" : ""}">
        <div class="note-meta">
          <span><span class="note-author">${n.autor || "Desconocido"}</span> · ${fmtFecha(n.fecha)}</span>
        </div>
        <div class="note-text">${(n.texto || "").replace(/</g,"&lt;")}</div>
        <div class="note-actions">
          <button onclick="resolveNote('${n.id}','${projectId}')">${n.resuelto === true || n.resuelto === "TRUE" ? "✓ Resuelta" : "Marcar resuelta"}</button>
          <button onclick="deleteNote('${n.id}','${projectId}')">Eliminar</button>
        </div>
      </div>
    `).join("")}
  </div>`;
}

async function submitNote(projectId){
  const input = document.getElementById(`note-input-${projectId}`);
  const statusEl = document.getElementById(`note-status-${projectId}`);
  const texto = input.value.trim();
  if(!texto) return;
  statusEl.textContent = "Guardando…";
  try{
    const res = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" }, // evita preflight CORS con Apps Script
      body: JSON.stringify({ action:"create", proyecto:projectId, autor:state.role, texto })
    });
    const data = await res.json();
    if(!data.ok) throw new Error(data.error || "Error desconocido");
    input.value = "";
    statusEl.textContent = "";
    loadNotes(projectId);
  }catch(err){
    statusEl.textContent = `Error: ${err.message}`;
  }
}

async function resolveNote(id, projectId){
  try{
    await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ action:"resolve", id })
    });
    loadNotes(projectId);
  }catch(err){ console.error(err); }
}

async function deleteNote(id, projectId){
  try{
    await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ action:"delete", id })
    });
    loadNotes(projectId);
  }catch(err){ console.error(err); }
}

function render(){
  renderPills();
  renderSidebar();
  renderMain();
}

render();
</script>
